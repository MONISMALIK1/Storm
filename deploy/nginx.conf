# /etc/nginx/sites-available/storm
# Symlink to /etc/nginx/sites-enabled/storm
#
# What this does:
#   • Terminates TLS (Let's Encrypt cert managed by certbot)
#   • Proxies all traffic to Uvicorn on 127.0.0.1:8000
#   • Upgrades WebSocket connections (/ws)
#   • Adds security headers
#   • Rate-limits the login endpoint to prevent brute-force
#   • Serves gzip-compressed responses

# Rate-limit zone for /auth/login (10 req/min per IP)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

server {
    listen 80;
    server_name intel.theorganicworld.in;

    # Let certbot handle ACME challenges; redirect everything else to HTTPS
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name intel.theorganicworld.in;

    # ── TLS (populated by certbot) ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/intel.theorganicworld.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intel.theorganicworld.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    # ── Proxy settings ─────────────────────────────────────────
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # ── Rate-limit the login endpoint ─────────────────────────
    location /auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
    }

    # ── WebSocket upgrade (/ws) ────────────────────────────────
    location /ws {
        proxy_pass              http://127.0.0.1:8000;
        proxy_http_version      1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout      86400;   # keep WS alive for 24 h max
    }

    # ── Everything else (API + dashboard) ─────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_read_timeout 60s;
        proxy_buffering    off;      # important for streaming responses
        gzip               on;
        gzip_types         text/plain text/css application/json application/javascript;
    }
}
